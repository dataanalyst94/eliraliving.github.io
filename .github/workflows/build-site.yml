name: Build & publish site

# Auto-rebuilds the static site whenever you change a source/content file
# (e.g. assets/data/catalog.js or assets/content/*.js) — including edits made
# right here on github.com. Runs `node build.js` and commits the regenerated
# pages, so your change is live in about a minute. No terminal needed.

on:
  push:
    branches: [ main ]
    paths:
      - 'build.js'
      - 'assets/data/**'
      - 'assets/content/**'
      - 'assets/js/**'
      - 'assets/css/**'
      - 'assets/img/**'
      - '.github/workflows/build-site.yml'
  workflow_dispatch: {}   # also lets you run it manually from the Actions tab

permissions:
  contents: write

concurrency:
  group: build-site
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build the site
        run: node build.js

      - name: Commit & publish if anything changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to publish."
          else
            git commit -m "Auto-build site from latest content [skip ci]"
            git push
          fi

      # Keep the LIVE GitHub Pages repo (eliraliving.github.io) in sync with this
      # dev repo. Without this, commits here never reach the live domain and the
      # site silently freezes. Requires a one-time secret PAGES_SYNC_TOKEN
      # (a PAT with 'repo' scope). If the secret is absent, this step no-ops.
      - name: Forward built site to live Pages repo
        env:
          SYNC: ${{ secrets.PAGES_SYNC_TOKEN }}
        run: |
          if [ -z "$SYNC" ]; then
            echo "::warning::PAGES_SYNC_TOKEN not set — live site (eliraliving.github.io) was NOT updated. Add the secret to enable auto-publish."
            exit 0
          fi
          git push "https://x-access-token:$SYNC@github.com/dataanalyst94/eliraliving.github.io.git" HEAD:main
          echo "✓ Forwarded to live Pages repo."
