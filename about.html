<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>About — Elira Living</title>
  <meta name="description" content="About Elira Living — born in Europe, made for everyone. Vegan, dermatologically tested cosmetics without boxes." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/css/styles.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%2317150F'/%3E%3Ctext x='50' y='70' font-family='Georgia,serif' font-size='62' fill='%23F4F0E8' text-anchor='middle'%3EE%3C/text%3E%3C/svg%3E" />
</head>
<body data-page="about" class="relative">
  <header id="site-header"></header>

  <main class="relative z-10 pt-[108px]">
    <!-- Hero -->
    <section class="max-w-7xl mx-auto px-5 md:px-8 pt-12 md:pt-20 pb-16 text-center">
      <div class="kicker mb-4 reveal" data-i18n="about.kicker"></div>
      <h1 class="font-display text-[clamp(2.6rem,7vw,5.5rem)] leading-[1.0] max-w-4xl mx-auto reveal reveal-delay-1" data-i18n="about.title"></h1>
      <p class="mt-6 text-lg text-[color:var(--muted)] max-w-xl mx-auto reveal reveal-delay-2" data-i18n="about.lead"></p>
    </section>

    <section class="max-w-6xl mx-auto px-5 md:px-8">
      <div class="aspect-[16/8] overflow-hidden bg-gradient-to-br from-[#D8E6D6] to-[#7E9A86] reveal">
        <img src="https://images.unsplash.com/photo-1556228841-a3c527ebefe5?auto=format&fit=crop&w=1600&q=80"
          alt="Elira Living natural ingredients" class="w-full h-full object-cover" onerror="this.style.display='none'" />
      </div>
    </section>

    <section class="max-w-3xl mx-auto px-5 md:px-8 py-20 md:py-28">
      <p class="font-display text-2xl md:text-3xl leading-[1.4] reveal" data-i18n="about.body1"></p>
      <p class="mt-8 text-[17px] leading-relaxed text-[color:var(--ink-soft)] reveal reveal-delay-1" data-i18n="about.body2"></p>
    </section>

    <!-- Stats -->
    <section class="bg-[color:var(--ink)] text-[color:var(--cream)] relative z-10">
      <div class="max-w-7xl mx-auto px-5 md:px-8 py-20 grid grid-cols-1 sm:grid-cols-3 gap-10 text-center">
        <div class="reveal">
          <div class="font-display text-6xl">≤99%</div>
          <div class="mt-2 text-sm tracking-wide text-[color:var(--cream)]/70" data-i18n="about.stat1"></div>
        </div>
        <div class="reveal reveal-delay-1">
          <div class="font-display text-6xl">100%</div>
          <div class="mt-2 text-sm tracking-wide text-[color:var(--cream)]/70" data-i18n="about.stat2"></div>
        </div>
        <div class="reveal reveal-delay-2">
          <div class="font-display text-6xl">0</div>
          <div class="mt-2 text-sm tracking-wide text-[color:var(--cream)]/70" data-i18n="about.stat3"></div>
        </div>
      </div>
    </section>

    <section class="max-w-7xl mx-auto px-5 md:px-8 py-24 text-center">
      <h2 class="font-display text-4xl md:text-5xl mb-8 reveal" data-i18n="story.title"></h2>
      <a href="shop.html" class="btn btn-primary reveal reveal-delay-1" data-i18n="about.cta"></a>
    </section>
  </main>

  <footer id="site-footer"></footer>

  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/products.js"></script>
  <script src="assets/js/cart.js"></script>
  <script src="assets/js/stripe.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
