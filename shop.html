<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shop Natural Skincare & Haircare | Elira Living</title>
  <meta name="description" content="Browse Elira Living's full range of vegan, COSMOS-certified skincare and haircare. Cleansers, toners, moisturisers and shampoo — cruelty-free and made in the EU." />
  <meta name="keywords" content="shop natural skincare, vegan skincare, COSMOS certified products, natural haircare, facial cleanser, purifying toner, moisturizer, sensitive scalp shampoo, clean beauty store" />
  <link rel="canonical" href="https://eliraliving.com/shop.html" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Elira Living" />
  <meta property="og:title" content="Shop Natural Skincare & Haircare | Elira Living" />
  <meta property="og:description" content="Vegan, COSMOS-certified skincare and haircare — cleansers, toners, moisturisers and shampoo. Cruelty-free, made in the EU." />
  <meta property="og:url" content="https://eliraliving.com/shop.html" />
  <meta property="og:image" content="https://eliraliving.com/assets/img/og-image.jpg" />
  <meta property="og:locale" content="en_GB" />
  <meta property="og:locale:alternate" content="de_DE" />
  <meta property="og:locale:alternate" content="nl_NL" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="https://eliraliving.com/assets/img/og-image.jpg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/css/styles.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%2317150F'/%3E%3Ctext x='50' y='70' font-family='Georgia,serif' font-size='62' fill='%23F4F0E8' text-anchor='middle'%3EE%3C/text%3E%3C/svg%3E" />
</head>
<body data-page="shop" class="relative">
  <header id="site-header"></header>

  <main class="relative z-10 pt-[108px]">
    <section class="max-w-7xl mx-auto px-5 md:px-8 pt-10 md:pt-16">
      <div class="reveal max-w-2xl">
        <div class="kicker mb-2" data-i18n="cat.kicker"></div>
        <h1 class="font-display text-5xl md:text-6xl" data-i18n="shop.title"></h1>
        <p class="mt-4 text-[color:var(--muted)]" data-i18n="shop.lead"></p>
      </div>

      <!-- Filters -->
      <div class="mt-10 flex flex-col gap-5 reveal reveal-delay-1">
        <div class="flex flex-wrap items-center justify-between gap-4">
          <div class="flex flex-wrap items-center gap-2">
            <button data-filter-cat="all" class="filter-chip" data-i18n="shop.all"></button>
            <button data-filter-cat="skincare" class="filter-chip" data-i18n="cat.skincare"></button>
            <button data-filter-cat="haircare" class="filter-chip" data-i18n="cat.haircare"></button>
          </div>
          <div class="flex items-center gap-4">
            <span class="text-sm text-[color:var(--muted)]" data-shop-count></span>
            <div class="relative">
              <select data-sort class="appearance-none bg-transparent border border-[color:var(--line)] text-sm pl-3 pr-8 py-2 cursor-pointer focus:outline-none focus:border-[color:var(--ink)]">
                <option value="featured" data-i18n-opt="shop.sort.featured">Featured</option>
                <option value="priceAsc" data-i18n-opt="shop.sort.priceAsc">Price ↑</option>
                <option value="priceDesc" data-i18n-opt="shop.sort.priceDesc">Price ↓</option>
                <option value="name" data-i18n-opt="shop.sort.name">A–Z</option>
              </select>
              <svg class="pointer-events-none absolute right-2 top-1/2 -translate-y-1/2" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
            </div>
          </div>
        </div>
      </div>

      <!-- Grid -->
      <div class="mt-12 pb-24 grid grid-cols-2 lg:grid-cols-4 gap-x-5 gap-y-12" data-shop-grid></div>
    </section>
  </main>

  <footer id="site-footer"></footer>

  <style>
    .filter-chip { padding:.6rem 1.3rem; border:1px solid var(--line); font-size:.95rem; cursor:pointer; transition:all .2s var(--ease); }
    .filter-chip:hover { border-color: var(--ink); }
    .filter-chip[aria-pressed="true"] { background: var(--ink); color: var(--cream); border-color: var(--ink); }
    .filter-chip-sm { padding:.35rem .9rem; border:1px solid transparent; font-size:.82rem; text-transform:uppercase; letter-spacing:.08em; cursor:pointer; transition:all .2s var(--ease); color: var(--muted); }
    .filter-chip-sm:hover { color: var(--ink); }
    .filter-chip-sm[aria-pressed="true"] { color: var(--ink); border-color: var(--ink); }
  </style>

  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/products.js"></script>
  <script src="assets/js/seo.js"></script>
  <script src="assets/js/cart.js"></script>
  <script src="assets/js/stripe.js"></script>
  <script src="assets/js/main.js"></script>
  <script>
    // Localise the sort <select> options
    function localiseSort() {
      document.querySelectorAll("[data-i18n-opt]").forEach(o => o.textContent = I18nState.t(o.getAttribute("data-i18n-opt")));
    }
    document.addEventListener("DOMContentLoaded", localiseSort);
    document.addEventListener("langchange", localiseSort);
  </script>
</body>
</html>
