<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elira Living — Cosmetics for every face</title>
  <meta name="description" content="Elira Living — high-pigment, vegan cosmetics for men, women and everyone. Made in Europe. Free climate-neutral shipping in Germany & the Netherlands." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/css/styles.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%2317150F'/%3E%3Ctext x='50' y='70' font-family='Georgia,serif' font-size='62' fill='%23F4F0E8' text-anchor='middle'%3EE%3C/text%3E%3C/svg%3E" />
</head>
<body data-page="home" class="relative">
  <header id="site-header"></header>

  <main class="relative z-10 pt-[108px]">
    <!-- HERO -->
    <section class="max-w-7xl mx-auto px-5 md:px-8">
      <div class="grid lg:grid-cols-[1.05fr_0.95fr] gap-8 lg:gap-14 items-center pt-6 md:pt-12 pb-16 md:pb-24">
        <div>
          <div class="kicker fade-up-load" data-i18n="hero.kicker"></div>
          <h1 class="font-display text-[clamp(2.8rem,8vw,6.2rem)] leading-[0.95] tracking-tight mt-5">
            <span class="line-mask block"><span data-i18n="hero.title1"></span></span>
            <span class="line-mask block italic text-[color:var(--clay-700)]"><span data-i18n="hero.title2"></span></span>
          </h1>
          <p class="mt-7 text-lg leading-relaxed text-[color:var(--ink-soft)] max-w-md fade-up-load" style="animation-delay:.5s" data-i18n="hero.lead"></p>
          <div class="mt-9 flex flex-wrap gap-3 fade-up-load" style="animation-delay:.7s">
            <a href="shop.html" class="btn btn-primary" data-i18n="hero.cta"></a>
            <a href="about.html" class="btn btn-ghost link-underline" data-i18n="hero.cta2"></a>
          </div>
        </div>
        <div class="relative">
          <div class="aspect-[4/5] overflow-hidden bg-gradient-to-br from-[#E8C8A8] via-[#D9A982] to-[#A86A45]">
            <img src="https://images.unsplash.com/photo-1596704017254-9b121068fb31?auto=format&fit=crop&w=1100&q=80"
              alt="Elira Living model with natural editorial makeup"
              class="kenburns w-full h-full object-cover" onerror="this.style.display='none'" />
          </div>
          <div class="absolute -bottom-6 -left-6 hidden md:block bg-[color:var(--cream)] border border-[color:var(--line)] px-6 py-4 shadow-[var(--shadow-md)]">
            <div class="font-display text-3xl leading-none">12k+</div>
            <div class="text-xs text-[color:var(--muted)] mt-1" data-i18n="about.stat3"></div>
          </div>
        </div>
      </div>
    </section>

    <!-- VALUES MARQUEE -->
    <section class="border-y border-[color:var(--line)] bg-[color:var(--cream)] relative z-10">
      <div class="marquee py-4">
        <div class="marquee__track font-display text-2xl md:text-3xl">
          <span class="mx-10" data-i18n="marq.vegan"></span><span class="mx-2 text-[color:var(--clay)]">✦</span>
          <span class="mx-10" data-i18n="marq.cruelty"></span><span class="mx-2 text-[color:var(--clay)]">✦</span>
          <span class="mx-10" data-i18n="marq.made"></span><span class="mx-2 text-[color:var(--clay)]">✦</span>
          <span class="mx-10" data-i18n="marq.derm"></span><span class="mx-2 text-[color:var(--clay)]">✦</span>
          <span class="mx-10" data-i18n="marq.refill"></span><span class="mx-2 text-[color:var(--clay)]">✦</span>
          <span class="mx-10" data-i18n="marq.vegan"></span><span class="mx-2 text-[color:var(--clay)]">✦</span>
          <span class="mx-10" data-i18n="marq.cruelty"></span><span class="mx-2 text-[color:var(--clay)]">✦</span>
          <span class="mx-10" data-i18n="marq.made"></span><span class="mx-2 text-[color:var(--clay)]">✦</span>
        </div>
      </div>
    </section>

    <!-- CATEGORIES -->
    <section class="max-w-7xl mx-auto px-5 md:px-8 py-20 md:py-28">
      <div class="flex items-end justify-between mb-10 reveal">
        <div>
          <div class="kicker mb-2" data-i18n="cat.kicker"></div>
          <h2 class="font-display text-4xl md:text-5xl" data-i18n="cat.title"></h2>
        </div>
        <a href="shop.html" class="hidden md:inline-block link-underline text-sm" data-i18n="best.viewall"></a>
      </div>
      <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-3 md:gap-4">
        <a href="shop.html?category=face" class="reveal reveal-delay-1 group relative aspect-[3/4] overflow-hidden flex items-end p-4" style="background:linear-gradient(135deg,#E8C8A8,#C98F63)">
          <span class="font-display text-2xl text-[color:var(--ink)] relative z-10" data-i18n="cat.face"></span>
          <span class="absolute inset-0 bg-[color:var(--ink)] opacity-0 group-hover:opacity-10 transition-opacity duration-300"></span>
        </a>
        <a href="shop.html?category=eyes" class="reveal reveal-delay-1 group relative aspect-[3/4] overflow-hidden flex items-end p-4" style="background:linear-gradient(135deg,#9A8E7E,#3A332A)">
          <span class="font-display text-2xl text-[color:var(--cream)] relative z-10" data-i18n="cat.eyes"></span>
          <span class="absolute inset-0 bg-[color:var(--cream)] opacity-0 group-hover:opacity-10 transition-opacity duration-300"></span>
        </a>
        <a href="shop.html?category=lips" class="reveal reveal-delay-2 group relative aspect-[3/4] overflow-hidden flex items-end p-4" style="background:linear-gradient(135deg,#C98173,#8C3B2E)">
          <span class="font-display text-2xl text-[color:var(--cream)] relative z-10" data-i18n="cat.lips"></span>
          <span class="absolute inset-0 bg-[color:var(--cream)] opacity-0 group-hover:opacity-10 transition-opacity duration-300"></span>
        </a>
        <a href="shop.html?category=skin" class="reveal reveal-delay-2 group relative aspect-[3/4] overflow-hidden flex items-end p-4" style="background:linear-gradient(135deg,#CFE0CE,#7E9A86)">
          <span class="font-display text-2xl text-[color:var(--ink)] relative z-10" data-i18n="cat.skin"></span>
          <span class="absolute inset-0 bg-[color:var(--ink)] opacity-0 group-hover:opacity-10 transition-opacity duration-300"></span>
        </a>
        <a href="shop.html?category=fragrance" class="reveal reveal-delay-3 group relative aspect-[3/4] overflow-hidden flex items-end p-4" style="background:linear-gradient(135deg,#E4D9C4,#B89B6E)">
          <span class="font-display text-2xl text-[color:var(--ink)] relative z-10" data-i18n="cat.fragrance"></span>
          <span class="absolute inset-0 bg-[color:var(--ink)] opacity-0 group-hover:opacity-10 transition-opacity duration-300"></span>
        </a>
        <a href="shop.html?category=tools" class="reveal reveal-delay-3 group relative aspect-[3/4] overflow-hidden flex items-end p-4" style="background:linear-gradient(135deg,#D7CFC2,#9A8C78)">
          <span class="font-display text-2xl text-[color:var(--ink)] relative z-10" data-i18n="cat.tools"></span>
          <span class="absolute inset-0 bg-[color:var(--ink)] opacity-0 group-hover:opacity-10 transition-opacity duration-300"></span>
        </a>
      </div>
    </section>

    <!-- BESTSELLERS -->
    <section class="max-w-7xl mx-auto px-5 md:px-8 pb-20 md:pb-28">
      <div class="text-center max-w-xl mx-auto mb-12 reveal">
        <div class="kicker mb-2" data-i18n="best.kicker"></div>
        <h2 class="font-display text-4xl md:text-5xl" data-i18n="best.title"></h2>
        <p class="mt-4 text-[color:var(--muted)]" data-i18n="best.lead"></p>
      </div>
      <div class="grid grid-cols-2 lg:grid-cols-4 gap-x-5 gap-y-10" data-bestsellers></div>
      <div class="text-center mt-12 reveal">
        <a href="shop.html" class="btn btn-outline" data-i18n="best.viewall"></a>
      </div>
    </section>

    <!-- STORY -->
    <section class="bg-[color:var(--ink)] text-[color:var(--cream)] relative z-10 overflow-hidden">
      <div class="max-w-7xl mx-auto px-5 md:px-8 py-24 md:py-32 grid lg:grid-cols-2 gap-12 lg:gap-20 items-center">
        <div class="reveal order-2 lg:order-1">
          <div class="aspect-[5/6] overflow-hidden bg-gradient-to-br from-[#8C3B2E] to-[#3A332A]">
            <img src="https://images.unsplash.com/photo-1487412947147-5cebf100ffc2?auto=format&fit=crop&w=1100&q=80"
              alt="Elira Living editorial portrait" class="w-full h-full object-cover" onerror="this.style.display='none'" />
          </div>
        </div>
        <div class="reveal reveal-delay-1 order-1 lg:order-2">
          <div class="kicker mb-3" style="color:#E0A684" data-i18n="story.kicker"></div>
          <h2 class="font-display text-4xl md:text-6xl leading-[1.02]" data-i18n="story.title"></h2>
          <p class="mt-6 text-[17px] leading-relaxed text-[color:var(--cream)]/80 max-w-lg" data-i18n="story.body"></p>
          <ul class="mt-8 space-y-3 text-[15px]">
            <li class="flex items-center gap-3"><span class="text-[color:var(--clay)]">—</span><span data-i18n="story.p1"></span></li>
            <li class="flex items-center gap-3"><span class="text-[color:var(--clay)]">—</span><span data-i18n="story.p2"></span></li>
            <li class="flex items-center gap-3"><span class="text-[color:var(--clay)]">—</span><span data-i18n="story.p3"></span></li>
          </ul>
          <a href="about.html" class="inline-block mt-9 btn btn-outline !border-[color:var(--cream)] !text-[color:var(--cream)] hover:!bg-[color:var(--cream)] hover:!text-[color:var(--ink)]" data-i18n="story.cta"></a>
        </div>
      </div>
    </section>

    <!-- VALUE PROPS -->
    <section class="max-w-7xl mx-auto px-5 md:px-8 py-20 md:py-28">
      <div class="grid sm:grid-cols-2 lg:grid-cols-4 gap-px bg-[color:var(--line)] border border-[color:var(--line)]">
        <div class="bg-[color:var(--paper)] p-7 reveal">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" class="text-[color:var(--clay-700)]"><path d="M12 2C7 6 5 9 5 13a7 7 0 0 0 14 0c0-4-2-7-7-11Z"/></svg>
          <h3 class="font-display text-xl mt-4" data-i18n="value.1.t"></h3>
          <p class="text-sm text-[color:var(--muted)] mt-2 leading-relaxed" data-i18n="value.1.d"></p>
        </div>
        <div class="bg-[color:var(--paper)] p-7 reveal reveal-delay-1">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" class="text-[color:var(--clay-700)]"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18"/></svg>
          <h3 class="font-display text-xl mt-4" data-i18n="value.2.t"></h3>
          <p class="text-sm text-[color:var(--muted)] mt-2 leading-relaxed" data-i18n="value.2.d"></p>
        </div>
        <div class="bg-[color:var(--paper)] p-7 reveal reveal-delay-2">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" class="text-[color:var(--clay-700)]"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg>
          <h3 class="font-display text-xl mt-4" data-i18n="value.3.t"></h3>
          <p class="text-sm text-[color:var(--muted)] mt-2 leading-relaxed" data-i18n="value.3.d"></p>
        </div>
        <div class="bg-[color:var(--paper)] p-7 reveal reveal-delay-3">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" class="text-[color:var(--clay-700)]"><rect x="4" y="9" width="16" height="11" rx="2"/><path d="M8 9V6a4 4 0 0 1 8 0v3"/></svg>
          <h3 class="font-display text-xl mt-4" data-i18n="value.4.t"></h3>
          <p class="text-sm text-[color:var(--muted)] mt-2 leading-relaxed" data-i18n="value.4.d"></p>
        </div>
      </div>
    </section>

    <!-- NEWSLETTER -->
    <section class="max-w-7xl mx-auto px-5 md:px-8 pb-24">
      <div class="bg-[color:var(--cream)] border border-[color:var(--line)] px-6 md:px-16 py-16 md:py-20 text-center reveal">
        <div class="kicker mb-3" data-i18n="news.kicker"></div>
        <h2 class="font-display text-4xl md:text-5xl max-w-2xl mx-auto" data-i18n="news.title"></h2>
        <p class="mt-4 text-[color:var(--muted)] max-w-md mx-auto" data-i18n="news.lead"></p>
        <form class="mt-8 max-w-md mx-auto flex flex-col sm:flex-row gap-3" data-newsletter>
          <label class="sr-only" for="nl-email" data-i18n="news.placeholder"></label>
          <input id="nl-email" type="email" required data-i18n-ph="news.placeholder"
            class="flex-1 bg-[color:var(--paper)] border border-[color:var(--line)] px-4 py-3 focus:outline-none focus:border-[color:var(--ink)] transition-colors" />
          <button type="submit" class="btn btn-primary" data-i18n="news.btn"></button>
        </form>
        <p class="text-xs text-[color:var(--muted)] mt-4" data-i18n="news.consent"></p>
      </div>
    </section>
  </main>

  <footer id="site-footer"></footer>

  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/products.js"></script>
  <script src="assets/js/cart.js"></script>
  <script src="assets/js/stripe.js"></script>
  <script src="assets/js/main.js"></script>
  <script>
    document.addEventListener("submit", e => {
      if (e.target.matches("[data-newsletter]")) {
        e.preventDefault();
        e.target.innerHTML = `<p class="font-display text-2xl text-[color:var(--clay-700)]">${I18nState.t("news.thanks")}</p>`;
      }
    });
  </script>
</body>
</html>
